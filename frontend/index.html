<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee CRUD Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4">Employee CRUD Application</h2>

<div class="card p-3 mb-4">

    <input id="name" class="form-control mb-2" placeholder="Name">

    <input id="email" class="form-control mb-2" placeholder="Email">

    <input id="department" class="form-control mb-2" placeholder="Department">

    <input id="salary" class="form-control mb-3" placeholder="Salary">

    <button class="btn btn-primary" onclick="saveEmployee()">
        Save Employee
    </button>

</div>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Salary</th>

<th>Action</th>

</tr>

</thead>

<tbody id="employees">

</tbody>

</table>

<script src="app.js"></script>

</body>

</html>
