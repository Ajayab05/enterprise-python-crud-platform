apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: employee-ui-hpa
  namespace: employee-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-ui

  minReplicas: 3
  maxReplicas: 10

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      selectPolicy: Max