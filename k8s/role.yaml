apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: employee-api-role
  namespace: employee-prod

rules:

- apiGroups: [""]
  resources:
  - pods
  verbs:
  - get
  - list
  - watch

- apiGroups: [""]
  resources:
  - configmaps
  verbs:
  - get
  - list

- apiGroups: [""]
  resources:
  - secrets
  verbs:
  - get
